# Hitaveita (district hot water) / HomeWizard P1 MBus heat meter -> Home Assistant
# ---------------------------------------------------------------------------
# Home Assistant PACKAGE. See README.md.
#
#   BEFORE USE, EDIT:
#     1) YOUR_P1_IP            -> your HomeWizard P1 meter's IP address
#     2) MBus channel "0-1"    -> confirm with: curl http://YOUR_P1_IP/api/v1/telegram | grep 24.2.
#                                 (some meters are on 0-2 / 0-3; change everywhere if so)
#
# Why scrape the telegram: the P1 does NOT parse an attached MBus heat/water
# meter into /api/v1/data ("external": []). The raw telegram does expose it on
# 0-1:24.2.x, so we read it from there.
#
# Robustness notes:
#   - Each sensor has an `availability:` template: if its telegram line is missing
#     the sensor goes UNAVAILABLE instead of reporting a misleading 0.
#   - Numbers are matched with a strict pattern (-?\d+(?:\.\d+)?) per unit suffix.
#   - value_template returns `none` (-> Unknown) when nothing matches; never "0".
# ---------------------------------------------------------------------------

rest:
  - resource: "http://YOUR_P1_IP/api/v1/telegram"
    scan_interval: 30
    timeout: 10
    sensor:
      - name: "Hitaveita – Rúmmál"            # -> sensor.hitaveita_rummal
        unique_id: hitaveita_volume_m3
        device_class: water
        state_class: total_increasing
        unit_of_measurement: "m³"
        availability: >-
          {{ (value or '') | regex_findall('0-1:24\.2\.1\((-?\d+(?:\.\d+)?)\*m3\)') | length > 0 }}
        value_template: >-
          {% set m = (value or '') | regex_findall('0-1:24\.2\.1\((-?\d+(?:\.\d+)?)\*m3\)') %}
          {{ (m[0] | float) if m else none }}

      - name: "Hitaveita – Rennsli"           # -> sensor.hitaveita_rennsli
        unique_id: hitaveita_flow_lmin
        # NOTE: intentionally NO device_class. `volume_flow_rate` is unit-convertible,
        # so HA converts L/min back to m³/h (~0.05) which then rounds to 0 in cards.
        # Reporting plain L/min keeps the value readable (idle ~1, shower ~8-15).
        # Conversion: m³/h * 1000 / 60 = L/min.
        unit_of_measurement: "L/min"
        availability: >-
          {{ (value or '') | regex_findall('0-1:24\.2\.2\((-?\d+(?:\.\d+)?)\*m3/h\)') | length > 0 }}
        value_template: >-
          {% set m = (value or '') | regex_findall('0-1:24\.2\.2\((-?\d+(?:\.\d+)?)\*m3/h\)') %}
          {{ ((m[0] | float) * 1000 / 60) | round(1) if m else none }}

      - name: "Hitaveita – Framrásarhiti"     # -> sensor.hitaveita_framrasarhiti
        unique_id: hitaveita_supply_c
        device_class: temperature
        unit_of_measurement: "°C"
        availability: >-
          {{ (value or '') | regex_findall('0-1:24\.2\.3\((-?\d+(?:\.\d+)?)\*degC\)') | length > 0 }}
        value_template: >-
          {% set m = (value or '') | regex_findall('0-1:24\.2\.3\((-?\d+(?:\.\d+)?)\*degC\)') %}
          {{ (m[0] | float) if m else none }}

      - name: "Hitaveita – Bakrásarhiti"      # -> sensor.hitaveita_bakrasarhiti
        unique_id: hitaveita_return_c
        device_class: temperature
        unit_of_measurement: "°C"
        availability: >-
          {{ (value or '') | regex_findall('0-1:24\.2\.4\((-?\d+(?:\.\d+)?)\*degC\)') | length > 0 }}
        value_template: >-
          {% set m = (value or '') | regex_findall('0-1:24\.2\.4\((-?\d+(?:\.\d+)?)\*degC\)') %}
          {{ (m[0] | float) if m else none }}

      - name: "Hitaveita – Orka"              # -> sensor.hitaveita_orka
        unique_id: hitaveita_heat_wh
        # NOTE: register 24.2.5 is often a small / rolling value, NOT a guaranteed
        # lifetime-increasing counter. We therefore do NOT set a state_class, so HA
        # will not build (potentially misleading) long-term statistics from it and
        # will not offer it to the Energy dashboard. If you VERIFY that your meter's
        # 24.2.5 is a monotonically increasing lifetime energy total, you may add
        # `state_class: total_increasing` yourself. Volume (m³) is the usage figure.
        device_class: energy
        unit_of_measurement: "Wh"
        availability: >-
          {{ (value or '') | regex_findall('0-1:24\.2\.5\((-?\d+(?:\.\d+)?)\*Wh\)') | length > 0 }}
        value_template: >-
          {% set m = (value or '') | regex_findall('0-1:24\.2\.5\((-?\d+(?:\.\d+)?)\*Wh\)') %}
          {{ (m[0] | float) if m else none }}

# Fixed tariff price. There is no live price API for hitaveita; set this in the UI.
input_number:
  hitaveita_verd_per_m3:
    name: "Hitaveita – verð (ISK/m³)"
    min: 0
    max: 100000
    step: 0.01
    unit_of_measurement: "ISK/m³"
    mode: box
    icon: mdi:cash

# Monthly usage (resets on the 1st) -> sensor.hitaveita_rummal_manudur
# `source` is the volume sensor's entity_id. With the Icelandic name above HA
# generates `sensor.hitaveita_rummal`. If your install slugs it differently,
# update this source (and the cost templates below). See README troubleshooting.
utility_meter:
  hitaveita_manudur:
    source: sensor.hitaveita_rummal
    cycle: monthly
    name: "Hitaveita – Rúmmál (mánuður)"

template:
  - sensor:
      - name: "Hitaveita – Kostnaður (uppsafnaður)"
        unique_id: hitaveita_kostnadur_total
        unit_of_measurement: "ISK"
        device_class: monetary
        state_class: total
        icon: mdi:cash
        state: >-
          {% set v = states('sensor.hitaveita_rummal') | float(0) %}
          {% set p = states('input_number.hitaveita_verd_per_m3') | float(0) %}
          {{ (v * p) | round(0) }}

      - name: "Hitaveita – Kostnaður (mánuður)"
        unique_id: hitaveita_kostnadur_manudur
        unit_of_measurement: "ISK"
        device_class: monetary
        state_class: total
        icon: mdi:cash
        state: >-
          {% set v = states('sensor.hitaveita_rummal_manudur') | float(0) %}
          {% set p = states('input_number.hitaveita_verd_per_m3') | float(0) %}
          {{ (v * p) | round(0) }}
